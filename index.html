<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
        // 1. CONFIGURAÇÕES E CONEXÕES

        let currentSelection = null;

        // 2. BANCO DE DADOS DE ITENS (SINCRO TOTAL COM ANÁLISE TÉCNICA - 110 ITENS)
const ANALYSIS_ITEMS = {

        };

const MASTER_COMPONENTS = [
            {title: 'CCO', items: ["Limpeza Química / Neoclar", "Queima", "Graxear", "Vibro / Tombamento"]},
            {title: 'CT', items: ["Limpeza Química / Neoclar", "Queima", "Graxear"]},
            {title: 'EIXO', items: ["Graxear", "Rotor", "Graxear"]},
            {title: 'GEOMETRIA', items: ["Graxear", "Lavagem no Diesel"]},
            {title: 'ATUADOR', items: ["Graxear"]},
            {title: 'REPAROS', items: ["Lavagem no Diesel", "Graxear"]},
            {title: 'ANEXOS', items: ["Lavagem", "Graxear", "Queima", "Vibro / Tombamento"]},
            {title: 'ROTOR', items: ["Limpeza Química", "Balanceamento"]},
            {title: 'COLETOR', items: ["Jateamento", "Planeamento"]}
        ];

        function renderComponentGrid() {
            const grid = document.getElementById('component-grid');
            if (!grid || !currentSelection) return;

            // Une componentes fixos com eventuais itens especiais da sessão
            const allToRender = [...MASTER_COMPONENTS, ...(window.specialItemsList || [])];

            grid.innerHTML = allToRender.map(comp => {
                // Lógica de Bloqueio: Só fica cinza se foi enviado NESTA sessão ou se o estágio já mudou
                const trk = (currentSelection.tracking || []).find(t => t.component === comp.title);
                const isSent = !!trk && trk.stage !== 'Desmontagem';
                
                const cardStyle = isSent ? 'opacity-40 grayscale pointer-events-none' : '';
                const badgeText = isSent ? `EM ${trk.stage || 'SETOR'}` : 'Desmontagem';
                const badgeColor = isSent ? 'bg-slate-500' : 'bg-turbo-teal';

                const itemHtml = comp.items.map(item => `
                    <label class="flex items-center space-x-3 cursor-pointer group py-1.5">
                        <input type="checkbox" ${isSent ? 'disabled' : ''} 
                            class="w-5 h-5 rounded border-slate-300 text-turbo-teal focus:ring-turbo-teal transition-all" 
                            data-service="${item}">
                        <span class="text-xs font-bold text-slate-500 group-hover:text-slate-800 transition">${item}</span>
                    </label>
                `).join('');

                return `
                    <div class="bg-white rounded-3xl shadow-sm border-2 border-slate-100 overflow-hidden flex flex-col p-6 ${cardStyle}" id="card-comp-${comp.title.replace(/\s+/g, '-')}">
                        <div class="flex justify-between items-center mb-6">
                            <h4 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">${comp.title}</h4>
                            <span class="text-[10px] font-black uppercase px-4 py-1.5 ${badgeColor} text-white rounded-full tracking-widest">${badgeText}</span>
                        </div>
                        
                        <div class="flex-1 flex flex-col">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">CHECKLIST DE LIMPEZA/TRATAMENTO:</p>
                            <div class="space-y-1 mb-8">
                                ${itemHtml}
                            </div>
                            
                            <hr class="border-slate-100 mb-6">
                            
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">ENCAMINHAR PARA:</p>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="sendPieceToSector('${comp.title}', 'RETIFICA', this)" class="py-3 bg-slate-50 text-slate-700 text-[10px] font-black uppercase rounded-lg hover:bg-slate-100 transition">Retífica</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'SOLDA', this)" class="py-3 bg-slate-50 text-slate-700 text-[10px] font-black uppercase rounded-lg hover:bg-slate-100 transition">Solda</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'METROLOGIA', this)" class="py-3 bg-slate-50 text-slate-700 text-[10px] font-black uppercase rounded-lg hover:bg-slate-100 transition">Metrologia</button>

                                <button onclick="sendPieceToSector('${comp.title}', 'MONTAGEM', this)" class="col-span-2 py-4 bg-emerald-600 text-white text-[11px] font-black uppercase rounded-xl transition hover:bg-emerald-700 shadow-lg shadow-emerald-100 mt-2">Pronto p/ Montagem</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // 5. FUNÇÕES DE SUPORTE
        function updateSelectColor(el) {
            const val = el.value;
            el.classList.remove('bg-slate-400', 'bg-emerald-500', 'bg-yellow-500', 'bg-red-600', 'text-white');
            if (val === 'NÃO INFORMADO') el.classList.add('bg-slate-400', 'text-white');
            else if (val === 'PEÇA OK') el.classList.add('bg-emerald-500', 'text-white');
            else if (val === 'RECONDICIONAR') el.classList.add('bg-yellow-500', 'text-white');
            else if (val === 'TROCAR') el.classList.add('bg-red-600', 'text-white');
        }

        function switchTab(btn, tabId) {
            const navButtons = btn.parentElement.querySelectorAll('button');
            navButtons.forEach(b => {
                b.classList.remove('tab-active', 'text-turbo-orange', 'border-b-2', 'border-turbo-orange');
                b.classList.add('text-slate-400');
            });
            btn.classList.add('tab-active', 'text-turbo-orange', 'border-b-2', 'border-turbo-orange');
            btn.classList.remove('text-slate-400');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        

        async function sendPieceToSector(pieceName, sector, btnElement) {
            const card = document.getElementById('card-comp-' + pieceName);
            const services = Array.from(card.querySelectorAll('input:checked')).map(c => c.dataset.service);
            btnElement.disabled = true;
            try {
                const response = await fetch(API_ROUTING, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ os_id: currentSelection.id, component: pieceName, target: sector, executed_services: services }) });
                if (response.ok) { card.classList.add('opacity-40', 'grayscale', 'pointer-events-none'); btnElement.innerHTML = `ENVIADO`; } 
                else { btnElement.disabled = false; }
            } catch (e) { btnElement.disabled = false; }
        }

        async function handleAction(type) {
            const btn = type === 'START' ? document.getElementById('btn-start') : document.querySelector('.bg-turbo-orange');
            btn.disabled = true;
            try {
                const res = await fetch(API_ACTION, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ os_id: currentSelection.id, action: type, user_id: USER_ID }) });
                if (res.ok) { 
                    document.getElementById('modalSuccess').classList.remove('hidden'); 
                    if(type === 'FINISH') window.location.reload();
                }
            } catch (e) { console.error(e); }
            finally { btn.disabled = false; }
        }

        function condenarTudoCaracol(check) {
            const selects = document.getElementById('tab-caracol').querySelectorAll('select');
            selects.forEach(sel => { sel.value = check.checked ? 'TROCAR' : 'NÃO INFORMADO'; updateSelectColor(sel); });
        }

        // Memória temporária para itens especiais da OS selecionada
        let specialItemsList = [];

        function openSpecialModal() {
            document.getElementById('special-item-name').value = '';
            validateSpecialModal();
            document.getElementById('modalSpecial').classList.remove('hidden');
        }

        function toggleRadioStyle() {
            const isRetrabalho = document.querySelector('input[name="special-type"]:checked').value === 'RETRABALHO';
            const lp = document.getElementById('label-padrao');
            const lr = document.getElementById('label-retrabalho');
            
            if(isRetrabalho) {
                lr.classList.add('border-turbo-teal', 'bg-teal-50/30');
                lr.querySelector('div').innerHTML = '<div class="w-2 h-2 bg-turbo-teal rounded-full"></div>';
                lp.classList.remove('border-turbo-teal', 'bg-teal-50/30');
                lp.querySelector('div').innerHTML = '';
            } else {
                lp.classList.add('border-turbo-teal', 'bg-teal-50/30');
                lp.querySelector('div').innerHTML = '<div class="w-2 h-2 bg-turbo-teal rounded-full"></div>';
                lr.classList.remove('border-turbo-teal', 'bg-teal-50/30');
                lr.querySelector('div').innerHTML = '';
            }
        }

        function validateSpecialModal() {
            const name = document.getElementById('special-item-name').value;
            const btn = document.getElementById('btn-add-special');
            if(name.length >= 3) {
                btn.disabled = false;
                btn.className = 'flex-[2] bg-turbo-teal text-white font-black py-4 rounded-2xl uppercase text-xs tracking-widest shadow-lg hover:bg-teal-700 transition-all cursor-pointer';
            } else {
                btn.disabled = true;
                btn.className = 'flex-[2] bg-turbo-teal/40 text-white font-black py-4 rounded-2xl uppercase text-xs tracking-widest cursor-not-allowed';
            }
        }

        function addSpecialCard() {
            const name = document.getElementById('special-item-name').value.toUpperCase();
            const type = document.querySelector('input[name="special-type"]:checked').value;
            
            const newCard = {
                title: name,
                type: type,
                items: ["Limpeza Química / Neoclar", "Queima", "Graxear", "Vibro / Tombamento"],
                isSpecial: true
            };

            specialItemsList.push(newCard);
            closeModal('modalSpecial');
            renderComponentGrid(); // Re-renderiza o grid com o novo item
        }

        // Modifica o renderComponentGrid para incluir os itens especiais
        const originalRenderComponentGrid = renderComponentGrid;
        renderComponentGrid = function() {
            const grid = document.getElementById('component-grid');
            if (!grid) return;

            // Combina os componentes mestres com os especiais criados no momento
            const allComponentsToRender = [...MASTER_COMPONENTS, ...specialItemsList];

            grid.innerHTML = allComponentsToRender.map(comp => {
                const trk = (currentSelection.tracking || []).find(t => t.component === comp.title);
                const isRoteada = !!trk;
                const cardStyle = isRoteada ? 'opacity-40 grayscale pointer-events-none' : '';
                
                // Badge inteligente
                let badgeText = comp.isSpecial ? (comp.type === 'RETRABALHO' ? 'RETRABALHO' : 'ESPECIAL') : 'AGUARDANDO';
                if(isRoteada) badgeText = `EM SETOR`;
                
                const badgeColor = isRoteada ? 'bg-slate-500' : (comp.type === 'RETRABALHO' ? 'bg-red-600' : 'bg-turbo-teal');

                const itemHtml = comp.items.map(item => {
                    const isChecked = isRoteada && (trk.services || []).includes(item) ? 'checked' : '';
                    return `<label class="flex items-center space-x-2 p-1 cursor-pointer hover:bg-slate-50 rounded transition"><input type="checkbox" ${isChecked} ${isRoteada ? 'disabled' : ''} class="w-4 h-4 rounded border-slate-300 text-turbo-teal" data-service="${item}"><span class="text-[10px] font-bold text-slate-600 uppercase tracking-tighter">${item}</span></label>`;
                }).join('');

                return `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col ${cardStyle}" id="card-comp-${comp.title.replace(/\s+/g, '-')}">
                        <div class="px-5 py-4 bg-slate-50 border-b flex justify-between items-center">
                            <h4 class="text-xs font-black uppercase text-slate-800 italic">${comp.title}</h4>
                            <span class="text-[8px] font-black uppercase px-2 py-1 ${badgeColor} text-white rounded-md tracking-widest shadow-sm">${badgeText}</span>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3 italic">Checklist Limpeza/Tratamento:</p>
                            <div class="overflow-y-auto max-h-[160px] space-y-1 mb-6 pr-1">${itemHtml}</div>
                            <div class="grid grid-cols-2 gap-2 mt-auto">
                                <button onclick="sendPieceToSector('${comp.title}', 'RETIFICA', this)" class="py-2 border border-slate-100 text-[9px] font-black uppercase rounded-xl hover:bg-turbo-teal hover:text-white transition shadow-sm bg-white">Retífica</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'SOLDA', this)" class="py-2 border border-slate-100 text-[9px] font-black uppercase rounded-xl hover:bg-turbo-teal hover:text-white transition shadow-sm bg-white">Solda</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'METROLOGIA', this)" class="py-2 border border-slate-100 text-[9px] font-black uppercase rounded-xl hover:bg-turbo-teal hover:text-white transition shadow-sm bg-white">Metrologia</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'BANCADA', this)" class="py-2 border border-slate-100 text-[9px] font-black uppercase rounded-xl hover:bg-turbo-teal hover:text-white transition shadow-sm bg-white">Bancada</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'MONTAGEM', this)" class="col-span-2 py-3 bg-emerald-500 text-white text-[10px] font-black uppercase rounded-xl transition hover:bg-emerald-600 shadow-md shadow-emerald-50">Pronto p/ Montagem</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        };

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        // Limpar lista especial ao trocar de OS
        const originalSelectOS = selectOS;
        selectOS = function(os) {
            specialItemsList = []; // Reseta a lista de itens temporários
            originalSelectOS(os);
        };
    </script>
</body>
</html>
