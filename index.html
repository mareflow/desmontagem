            {title: 'CT', items: ["FACEAMENTO PÉ/ MESA", "FACEAMENTO SAÍDA", "REMOVER WASTEGATES", "MONTAR WASTEGATE", "FRESAMENTO DA MOEDA", "ACENTAMENTO DA CCE", "ADAPTAÇÃO DE BORDA", "EMBUCHAMENTO SAÍDA"]},
            {title: 'EIXO', items: ["ANÁLISE", "DESEMPENO", "ABERTURA CAVA", "USINAGEM", "ABERTURA ANEL", "RETIFICA", "ROSCA EIXO", "FACEAMENTO", "FURO CENTRO", "TRANSFORMAR", "POLIMENTO EIXO"]},
            {title: 'ROTOR', items: ["ANÁLISE", "FACEAMENTO / PORCA", "TRANSFORMAÇÃO", "EMBUCHAMENTO ROTOR", "FACEAMENTO DE PALHETAS"]},

        ];

        document.addEventListener('DOMContentLoaded', loadDisassemblyQueue);

        async function loadDisassemblyQueue() {
            const listContainer = document.getElementById('os-list');
            try {
                const response = await fetch(API_QUEUE);
                const result = await response.json();
                queueData = Array.isArray(result) ? result : (result.data || []);
                listContainer.innerHTML = '';
                if (queueData.length === 0) {
                    listContainer.innerHTML = '<div class="p-10 text-center text-slate-400 text-xs italic">Fila Vazia.</div>';
                    return;
                }
                queueData.forEach(os => {
                    const card = document.createElement('div');
                    card.className = 'os-card p-5 cursor-pointer hover:bg-slate-50 transition border-l-4 border-transparent bg-white rounded-xl shadow-sm mb-3 mx-4 mt-4';
                    card.id = `card-${os.id}`;
                    card.onclick = () => selectOS(os);
                    card.innerHTML = `<div class="flex justify-between items-start mb-2"><span class="text-sm font-black text-slate-900">${os.business_id}</span><span class="px-2 py-0.5 text-[9px] font-black uppercase rounded-md bg-blue-100 text-blue-600">${os.urgency || 'Normal'}</span></div><p class="text-xs font-bold text-slate-700 uppercase mb-1">${os.model}</p><p class="text-[10px] font-medium text-slate-500 uppercase truncate">${os.client}</p>`;
                    listContainer.appendChild(card);
                });
            } catch (e) { console.error("Erro Fila:", e); }
        }

        function selectOS(os) {
            currentSelection = os;
            document.querySelectorAll('#os-list > div').forEach(c => c.classList.remove('os-selected'));
            document.getElementById(`card-${os.id}`)?.classList.add('os-selected');
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('main-workspace').classList.remove('hidden');
            document.getElementById('footer-actions').classList.remove('hidden');
            document.getElementById('display-os').innerText = os.business_id;
            document.getElementById('display-desc').innerText = `${os.client} | ${os.model}`;
            renderChecklists(); 
            renderComponentGrid(); 
        }

        function renderChecklists() {
            Object.keys(ANALYSIS_ITEMS).forEach(tabId => {
                const container = document.getElementById(tabId);
                if (!container) return;
                let html = '';
                if (tabId === 'tab3') {
                    html += `<div class="p-3 mb-3 border border-red-200 rounded-xl bg-red-50/50 flex items-center space-x-3"><input type="checkbox" id="condenar-caracol-global" onchange="condenarTudoCaracol(this)" class="w-5 h-5 text-red-600 border-red-300 rounded focus:ring-red-500"><label for="condenar-caracol-global" class="text-[10px] font-black text-red-700 uppercase">CONDENAR CARACOL COMPLETO (TROCAR)</label></div>`;
                }
                html += ANALYSIS_ITEMS[tabId].map(item => `
                    <div class="grid grid-cols-12 gap-3 items-center bg-white p-2 border-b border-slate-50 hover:bg-slate-50 transition">
                        <div class="col-span-5 text-[10px] font-bold text-slate-600 uppercase tracking-tighter ml-2">${item}</div>
                        <div class="col-span-3">
                            <select onchange="updateSelectColor(this)" class="w-full bg-slate-400 text-white text-[9px] font-black py-1.5 rounded-lg uppercase text-center outline-none">

                                <option value="PEÇA OK">PEÇA OK</option>
                                <option value="RECONDICIONAR">RECONDICIONAR</option>
                                <option value="TROCAR">TROCAR</option>
                            </select>
                        </div>
                        <div class="col-span-4"><input type="text" placeholder="Obs..." class="w-full bg-slate-100 text-slate-500 text-[10px] rounded-lg px-3 py-1.5 outline-none focus:ring-1 focus:ring-turbo-teal"></div>
                    </div>`).join('');
                container.innerHTML = html;
            });

            // Listener de abas idêntico ao análise
            document.querySelectorAll('.tab-button-disassembly').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-content-disassembly').forEach(c => c.classList.add('hidden'));
                    document.querySelectorAll('.tab-button-disassembly').forEach(b => {
                        b.classList.remove('text-turbo-teal', 'border-b-2', 'border-turbo-teal', 'font-bold');
                        b.classList.add('text-gray-500', 'font-medium');
                    });
                    document.getElementById(btn.dataset.tab).classList.remove('hidden');
                    btn.classList.add('text-turbo-teal', 'border-b-2', 'border-turbo-teal', 'font-bold');
                    btn.classList.remove('text-gray-500', 'font-medium');
                };
            });

        function renderComponentGrid() {
            const grid = document.getElementById('component-grid');
            grid.innerHTML = MASTER_COMPONENTS.map(comp => {
                const trk = (currentSelection.tracking || []).find(t => t.component === comp.title);

                const itemHtml = comp.items.map(item => {
                    const isChecked = isRoteada && (trk.services || []).includes(item) ? 'checked' : '';
                    return `<label class="flex items-center space-x-2 p-1"><input type="checkbox" ${isChecked} ${isRoteada ? 'disabled' : ''} class="w-4 h-4 rounded border-slate-300 text-turbo-teal" data-service="${item}"><span class="text-[10px] font-bold text-slate-600 uppercase">${item}</span></label>`;

        // 5. FUNÇÕES DE SUPORTE
        function updateSelectColor(el) {
            const val = el.value;
            el.classList.remove('bg-slate-400', 'bg-emerald-500', 'bg-yellow-500', 'bg-red-600', 'text-white');
            if (val === 'NÃO INFORMADO') el.classList.add('bg-slate-400', 'text-white');
            else if (val === 'PEÇA OK') el.classList.add('bg-emerald-500', 'text-white');
            else if (val === 'RECONDICIONAR') el.classList.add('bg-yellow-500', 'text-white');
            else if (val === 'TROCAR') el.classList.add('bg-red-600', 'text-white');
        }

        function switchTab(btn, tabId) {
            const navButtons = btn.parentElement.querySelectorAll('button');
            navButtons.forEach(b => {
                b.classList.remove('tab-active', 'text-turbo-orange', 'border-b-2', 'border-turbo-orange');
                b.classList.add('text-slate-400');
            });
            btn.classList.add('tab-active', 'text-turbo-orange', 'border-b-2', 'border-turbo-orange');
            btn.classList.remove('text-slate-400');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

            btnElement.disabled = true;
            try {
                const response = await fetch(API_ROUTING, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ os_id: currentSelection.id, component: pieceName, target: sector, executed_services: services }) });
                if (response.ok) { card.classList.add('opacity-40', 'grayscale', 'pointer-events-none'); btnElement.innerHTML = `ENVIADO`; } 
                else { btnElement.disabled = false; }
            } catch (e) { btnElement.disabled = false; }
        }

        async function handleAction(type) {
            const btn = type === 'START' ? document.getElementById('btn-start') : document.querySelector('.bg-turbo-orange');
            btn.disabled = true;
            try {
                const res = await fetch(API_ACTION, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ os_id: currentSelection.id, action: type, user_id: USER_ID }) });
                if (res.ok) { 
                    document.getElementById('modalSuccess').classList.remove('hidden'); 
                    if(type === 'FINISH') window.location.reload();
                }
            } catch (e) { console.error(e); }
            finally { btn.disabled = false; }
        }

        function condenarTudoCaracol(check) {
            const selects = document.getElementById('tab-caracol').querySelectorAll('select');
            selects.forEach(sel => { sel.value = check.checked ? 'TROCAR' : 'NÃO INFORMADO'; updateSelectColor(sel); });
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
