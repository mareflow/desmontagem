<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setor de Desmontagem | TurboSul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-turbo-teal { background-color: #0D9488; }
        .text-turbo-teal { color: #0D9488; }
        .border-turbo-teal { border-color: #0D9488; }
        .bg-turbo-orange { background-color: #EA580C; }
        .os-selected { border-left: 4px solid #0D9488; background-color: #f0fdfa; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #0D9488; border-radius: 10px; }
        .input-clean { background-color: #ffffff; border: 1px solid #d1d5db; color: #111827; transition: all 0.2s; }
        .input-clean:focus { border-color: #0D9488; outline: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen overflow-hidden">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between sticky top-0 z-40">
        <div class="flex items-center space-x-4">
            <img src="https://i.postimg.cc/Jh5Jvrc9/IMG-7901.png" alt="TurboSul Logo" class="h-10">
            <div>
                <h1 class="text-lg font-bold tracking-tight">TurboSul - Controle de Produção</h1>
                <p class="text-xs text-slate-500">Gerenciamento de Ordens de Serviço</p>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <div class="text-right border-r pr-6 border-slate-200">
                <p class="text-sm font-bold leading-none">Administrador</p>
                <p class="text-[10px] text-slate-500 uppercase tracking-wider">Desmontagem</p>
            </div>
            <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md text-sm font-bold transition">Sair</button>
        </div>
    </header>

    <div class="flex h-[calc(100vh-64px)]">
        <aside class="w-80 bg-white border-r border-slate-200 overflow-y-auto flex-shrink-0">
            <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-500">Ordens em Desmonte</h2>
                <button onclick="loadDisassemblyQueue()" class="text-turbo-teal"><i class="fa-solid fa-rotate"></i></button>
            </div>
            <div id="os-list" class="divide-y divide-slate-100">
                <div class="p-8 text-center text-slate-400 text-xs italic">Carregando fila...</div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-slate-400">
                <i class="fa-solid fa-file-invoice text-5xl mb-4 opacity-20"></i>
                <p class="uppercase tracking-widest font-bold text-sm">Selecione uma Ordem de Serviço</p>
            </div>

            <div id="main-workspace" class="hidden space-y-6">
                <div class="flex flex-col lg:flex-row gap-6">
                    <div class="flex-1 bg-turbo-teal rounded-2xl shadow-sm text-white p-6 min-h-[160px] flex flex-col justify-between">
                        <div>
                            <h2 id="display-os" class="text-3xl font-black mb-1 italic">OS-XXXX</h2>
                            <p id="display-desc" class="text-sm font-medium opacity-90 uppercase tracking-widest">CLIENTE | MODELO</p>
                        </div>
                        <div class="flex space-x-3">
                            <button onclick="handleAction('START')" id="btn-start" class="bg-white text-turbo-teal px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest">Iniciar Desmontagem</button>
                        </div>
                    </div>

                    <div class="lg:w-96 bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                        <h3 class="text-[10px] font-black uppercase text-turbo-teal mb-4">Identificação e Marcação</h3>
                        <div class="space-y-4">
                            <select class="w-full input-clean text-sm rounded-xl px-4 py-2.5">
                                <option>Consumidor Final</option><option>Estoque DPS</option><option>Outros</option>
                            </select>
                            <div class="flex space-x-2">
                                <input type="text" placeholder="Ex: CF-617" class="flex-1 input-clean text-sm font-mono rounded-xl px-4 py-2.5">
                                <button class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase">Gravar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                        <h3 class="text-[10px] font-black uppercase text-slate-400">Vistoria de Avarias</h3>
                    </div>
                    <div id="checklists-container" class="p-6 space-y-2"></div>
                </div>

                <div id="component-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-32"></div>
            </div>
        </main>
    </div>

    <!-- BOTÃO FIXO FINAL -->
    <div id="footer-actions" class="fixed bottom-0 right-0 p-8 z-30 hidden">
        <button onclick="handleAction('FINISH')" class="bg-turbo-orange hover:bg-orange-700 text-white px-10 py-5 rounded-2xl font-black uppercase tracking-widest text-sm shadow-2xl transition-all">
            Concluir Limpeza e Liberar OS
        </button>
    </div>

    <script>
        const API_QUEUE = 'https://webhook.mareflow.com.br/webhook/production/disassembly-queue';
        const API_ACTION = 'https://webhook.mareflow.com.br/webhook/production/disassembly-action';
        const API_ROUTING = 'https://webhook.mareflow.com.br/webhook/production/component-routing';

        let currentSelection = null;
        let queueData = [];

        document.addEventListener('DOMContentLoaded', loadDisassemblyQueue);

        async function loadDisassemblyQueue() {
            try {
                const response = await fetch(API_QUEUE);
                const result = await response.json();
                queueData = Array.isArray(result) ? result : (result.data || []);
                renderSidebar();
            } catch (error) { console.error(error); }
        }

        function renderSidebar() {
            const listContainer = document.getElementById('os-list');
            listContainer.innerHTML = '';
            queueData.forEach(os => {
                const isSelected = currentSelection?.id === os.id ? 'os-selected' : '';
                const card = document.createElement('div');
                card.className = `p-5 cursor-pointer border-l-4 border-transparent bg-white rounded-xl shadow-sm mb-3 mx-4 mt-4 ${isSelected}`;
                card.onclick = () => selectOS(os);
                card.innerHTML = `<span class="text-sm font-black">${os.business_id}</span><p class="text-xs text-slate-700 uppercase">${os.model}</p>`;
                listContainer.appendChild(card);
            });
        }

        function selectOS(os) {
            currentSelection = os;
            renderSidebar();
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('main-workspace').classList.remove('hidden');
            document.getElementById('footer-actions').classList.remove('hidden');
            document.getElementById('display-os').innerText = os.business_id;
            document.getElementById('display-desc').innerText = `${os.client} | ${os.model}`;
            renderComponentGrid();
        }

        function renderComponentGrid() {
            const grid = document.getElementById('component-grid');
            const components = [
                {title: 'CCE', items: ['Limpeza Química', 'Queima', 'Graxear']},
                {title: 'CCO', items: ['Limpeza Química', 'Queima', 'Graxear']},
                {title: 'CT', items: ['Limpeza Química', 'Queima']},
                {title: 'EIXO', items: ['Descarbonizar', 'Polimento']},
                {title: 'ROTOR', items: ['Limpeza Química', 'Queima']},
                {title: 'COLETOR', items: ['Limpeza Química', 'Jateamento']},
                {title: 'REPAROS', items: ['Lavagem', 'Conferência']},
                {title: 'GEOMETRIA', items: ['Graxear', 'Lavagem']},
                {title: 'ATUADOR', items: ['Teste Eletrônico']},
                {title: 'ANEXOS', items: ['Conferência', 'Lavagem']}
            ];

            grid.innerHTML = components.map(comp => {
                const trk = (currentSelection.tracking || []).find(t => t.component === comp.title);
                const isRoteada = !!trk;
                const cardStyle = isRoteada ? 'opacity-40 grayscale pointer-events-none' : '';
                const badgeText = isRoteada ? `EM ${trk.stage}` : 'AGUARDANDO';

                return `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col ${cardStyle}" id="card-comp-${comp.title}">
                        <div class="px-5 py-4 bg-slate-50 border-b flex justify-between items-center">
                            <h4 class="text-xs font-black uppercase italic">${comp.title}</h4>
                            <span class="text-[8px] font-black uppercase px-2 py-1 bg-turbo-teal text-white rounded-md">${badgeText}</span>
                        </div>
                        <div class="p-5 flex-1">
                            <div class="space-y-2 mb-6">
                                ${comp.items.map(item => `
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-turbo-teal" data-service="${item}">
                                        <span class="text-[11px] font-bold text-slate-600">${item}</span>
                                    </label>`).join('')}
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="sendPieceToSector('${comp.title}', 'RETIFICA', this)" class="py-2 border text-[9px] font-black uppercase rounded-lg hover:bg-slate-100">Retífica</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'SOLDA', this)" class="py-2 border text-[9px] font-black uppercase rounded-lg hover:bg-slate-100">Solda</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'METROLOGIA', this)" class="py-2 border text-[9px] font-black uppercase rounded-lg hover:bg-slate-100">Metrologia</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'BANCADA', this)" class="py-2 border text-[9px] font-black uppercase rounded-lg hover:bg-slate-100">Bancada</button>
                                <button onclick="sendPieceToSector('${comp.title}', 'MONTAGEM', this)" class="col-span-2 py-3 bg-emerald-500 text-white text-[10px] font-black uppercase rounded-lg mt-2">Pronto p/ Montagem</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function sendPieceToSector(pieceName, sector, btnElement) {
            const card = document.getElementById('card-comp-' + pieceName);
            const services = Array.from(card.querySelectorAll('input:checked')).map(c => c.dataset.service);
            btnElement.disabled = true;
            try {
                const response = await fetch(API_ROUTING, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ os_id: currentSelection.id, component: pieceName, target: sector, executed_services: services })
                });
                if (response.ok) {
                    card.classList.add('opacity-40', 'grayscale', 'pointer-events-none');
                    btnElement.innerHTML = `<i class="fa-solid fa-check"></i> OK: ${sector}`;
                } else { alert("Erro no servidor"); btnElement.disabled = false; }
            } catch (e) { alert("Erro de conexão"); btnElement.disabled = false; }
        }

        async function handleAction(type) {
            const btn = type === 'START' ? document.getElementById('btn-start') : document.querySelector('.bg-turbo-orange');
            btn.disabled = true;
            try {
                const res = await fetch(API_ACTION, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ os_id: currentSelection.id, action: type })
                });
                if (res.ok) window.location.reload();
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
